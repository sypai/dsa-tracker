<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0ece4; --surface: #e8e3d9; --surface2: #dfd9ce; --surface3: #d6d0c4;
    --border: #c9c2b4; --border2: #b8b0a0;
    --text: #1a1a18; --muted: #6b6458; --muted2: #9b9288;
    --accent: #b22a1e; --accent-dim: #c8382b; --accent-glow: rgba(178,42,30,0.08);
    --easy: #1d7a3a; --medium: #b85c00; --hard: #b22a1e;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html.dark {
    --bg: #0a0a0a; --surface: #111111; --surface2: #181818; --surface3: #1e1e1e;
    --border: #222222; --border2: #2e2e2e;
    --text: #e8e8e8; --muted: #666666; --muted2: #444444;
    --accent: #c0392b; --accent-dim: #7a1f17; --accent-glow: rgba(192,57,43,0.1);
    --easy: #2ecc71; --medium: #e67e22; --hard: #c0392b;
  }
  /* ── THEME TOGGLE ── */
  .theme-toggle { background: none; border: 1px solid var(--border2); color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap; }
  .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

  html { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; transition: background 0.25s, color 0.25s; }
  body { min-height: 100vh; max-width: 1020px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

  /* ── HEADER ── */
  .header { display: flex; flex-direction: row; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; margin-bottom: 2rem; }
  .logo { font-family: var(--font-display); font-size: 3rem; letter-spacing: 0.04em; color: var(--text); line-height: 1; }
  .logo span { color: var(--accent); }
  .tagline { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .activity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .streak-inline { text-align: right; }
  .streak-inline-num { font-family: var(--font-display); font-size: 2rem; color: var(--accent); line-height: 1; display: block; }
  .streak-inline-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── TOP PANEL: ELO left, counts right ── */
  .top-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); margin-bottom: 2rem; }

  /* ELO side */
  .elo-side { background: var(--surface); padding: 1.6rem 1.8rem; position: relative; overflow: hidden; }
  .elo-side::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .elo-rating { font-family: var(--font-display); font-size: 5.5rem; line-height: 1; color: var(--text); letter-spacing: 0.02em; transition: color 0.4s; }
  .elo-rating.bleeding { color: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .elo-rank { font-family: var(--font-display); font-size: 1.4rem; color: var(--accent); letter-spacing: 0.08em; margin-top: 2px; margin-bottom: 8px; }
  .elo-delta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .elo-delta .gain { color: var(--easy); }
  .elo-delta .loss { color: var(--accent); }
  .elo-bar-wrap { margin-top: 14px; }
  .elo-bar-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 9px; color: var(--muted2); margin-bottom: 5px; letter-spacing: 0.06em; }
  .elo-track { height: 3px; background: var(--border2); }
  .elo-fill { height: 100%; background: var(--accent); transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }

  /* Counts side */
  .counts-side { background: var(--surface); display: flex; flex-direction: column; }
  .counts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); flex: 1; }
  .count-cell { background: var(--surface); padding: 1.2rem 1.4rem; display: flex; flex-direction: column; justify-content: space-between; }
  .count-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
  .count-val { font-family: var(--font-display); font-size: 3.2rem; line-height: 1; color: var(--text); margin-top: 6px; }
  .count-val.c-easy   { color: var(--easy); }
  .count-val.c-medium { color: var(--medium); }
  .count-val.c-hard   { color: var(--hard); }

  /* ── DECAY BANNER ── */
  .decay-banner { background: rgba(178,42,30,0.08); border: 1px solid var(--accent-dim); border-top: none; padding: 10px 1.8rem; display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
  .decay-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; flex-shrink: 0; animation: pulse 1.2s ease-in-out infinite; }
  .decay-banner p { font-family: var(--font-mono); font-size: 11px; color: var(--accent); letter-spacing: 0.03em; }
  .decay-banner strong { color: var(--text); }

  /* ── ACTIVITY MAP ── */
  .activity-block { background: var(--surface); border: 1px solid var(--border); padding: 1rem 1.2rem; margin-bottom: 2rem; }
  .cal-grid { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 8px; }
  .cal-day { width: 13px; height: 13px; background: var(--border2); flex-shrink: 0; }
  .cal-day.done { background: var(--accent); }
  .cal-day.today { outline: 1px solid var(--accent); outline-offset: 1px; }
  .cal-day.decay { background: var(--accent-dim); opacity: 0.45; }

  /* Topics */
  .topics-block { margin-bottom: 2rem; }
  .topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .topic { font-family: var(--font-mono); font-size: 12px; padding: 5px 12px; border: 1px solid var(--border2); color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; user-select: none; }
  .topic:hover { border-color: var(--accent-dim); color: var(--text); }
  .topic.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .topic .count { color: var(--muted2); margin-left: 5px; }
  .topic.active .count { color: var(--accent-dim); }

  /* ── SECTION LABEL ── */
  .section-title { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* ── ADD FORM ── */
  .add-section { background: var(--surface); border: 1px solid var(--border); margin-bottom: 2rem; }
  .add-section-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .add-section-header span { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .add-section-header .toggle { font-family: var(--font-display); font-size: 1.1rem; color: var(--muted); transition: color 0.15s; }
  .add-section-header:hover .toggle { color: var(--accent); }
  .add-form-inner { padding: 1rem; display: flex; flex-direction: column; gap: 8px; }
  .add-row  { display: grid; grid-template-columns: 1fr 110px 110px 110px; gap: 8px; }
  .add-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .add-form-inner input,
  .add-form-inner select,
  .add-form-inner textarea {
    background: var(--bg); border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font-mono); font-size: 13px; padding: 9px 11px;
    outline: none; letter-spacing: 0.03em; transition: border-color 0.15s; width: 100%; resize: none;
  }
  .add-form-inner input:focus,
  .add-form-inner select:focus,
  .add-form-inner textarea:focus { border-color: var(--accent); }
  .add-form-inner input::placeholder,
  .add-form-inner textarea::placeholder { color: var(--muted); }
  .add-form-inner select option { background: var(--surface); }
  .add-form-inner textarea { height: 60px; }
  .add-bottom { display: flex; gap: 8px; align-items: stretch; }
  .elo-preview { flex: 1; font-family: var(--font-mono); font-size: 12px; color: var(--muted); padding: 9px 13px; background: var(--bg); border: 1px solid var(--border2); display: flex; align-items: center; gap: 6px; }
  .preview-val { color: var(--easy); font-weight: 500; }
  .add-btn { background: var(--accent); border: none; color: #f5f0e8; font-family: var(--font-display); font-size: 1.15rem; letter-spacing: 0.1em; padding: 9px 28px; cursor: pointer; transition: background 0.15s; }
  .add-btn:hover { background: #991f15; }

  /* ── QUESTION LIST ── */
  .list-header { display: grid; grid-template-columns: 1fr 80px 100px 110px 90px 36px; gap: 12px; padding: 7px 14px; margin-bottom: 4px; }
  .list-header span { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); }
  .q-list { display: flex; flex-direction: column; gap: 1px; }
  .q-item { background: var(--surface); border-left: 2px solid transparent; transition: background 0.15s, border-color 0.15s; animation: slideIn 0.22s ease; }
  .q-item:hover { background: var(--surface2); border-left-color: var(--accent); }
  @keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
  .q-main { display: grid; grid-template-columns: 1fr 80px 100px 110px 90px 36px; gap: 12px; padding: 14px; align-items: center; cursor: pointer; }
  .q-name { font-size: 15px; font-weight: 400; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .q-elo-gain { font-family: var(--font-mono); font-size: 13px; color: var(--easy); }
  .q-source { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
  .q-topic { font-family: var(--font-mono); font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .diff { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.05em; padding: 3px 10px; }
  .diff.easy   { color: var(--easy);   background: rgba(29,122,58,0.08); }
  .diff.medium { color: var(--medium); background: rgba(184,92,0,0.08); }
  .diff.hard   { color: var(--hard);   background: rgba(178,42,30,0.08); }
  .del-btn { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 16px; transition: color 0.15s; padding: 4px; text-align: center; }
  .del-btn:hover { color: var(--accent); }

  /* Expand panel */
  .q-expand { border-top: 1px solid var(--border); padding: 16px; display: none; background: var(--surface3); }
  .q-expand.open { display: block; }
  .expand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .expand-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted2); margin-bottom: 6px; }
  .expand-notes { font-size: 13px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
  .expand-link { font-family: var(--font-mono); font-size: 12px; color: var(--accent); text-decoration: none; word-break: break-all; }
  .expand-link:hover { text-decoration: underline; }
  .expand-date { font-family: var(--font-mono); font-size: 11px; color: var(--muted2); }
  .note-dot { display: inline-block; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin-left: 6px; vertical-align: middle; }

  .empty { text-align: center; padding: 3rem; font-family: var(--font-mono); font-size: 13px; color: var(--muted2); letter-spacing: 0.06em; }
  .empty-big { font-family: var(--font-display); font-size: 2.5rem; color: var(--border2); display: block; margin-bottom: 8px; }

  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); }

  @media (max-width: 700px) {
    .top-panel { grid-template-columns: 1fr; }
    .add-row { grid-template-columns: 1fr 1fr; }
    .add-row2 { grid-template-columns: 1fr; }
    .list-header { display: none; }
    .q-main { grid-template-columns: 1fr auto 32px; }
    .q-source,.q-topic,.q-elo-gain { display: none; }
    .expand-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">DSA<span>.</span>LOG</div>
    <div class="tagline">elo engine · time decay · grind or bleed</div>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">○ Light</button>
</div>

<!-- TOP PANEL: ELO + COUNTS SIDE BY SIDE -->
<div class="top-panel">
  <!-- ELO -->
  <div class="elo-side">
    <div class="elo-rating" id="eloDisplay">1600</div>
    <div class="elo-rank" id="eloRank">NOVICE</div>
    <div class="elo-delta">
      Earned: <span class="gain" id="gainFromSolved">+0</span>
      &nbsp;·&nbsp;
      Decay: <span class="loss" id="lossFromDecay">-0</span>
    </div>
    <div class="elo-bar-wrap">
      <div class="elo-bar-labels"><span id="prevRankLabel"></span><span id="nextRankLabel"></span></div>
      <div class="elo-track"><div class="elo-fill" id="eloBar" style="width:0%"></div></div>
    </div>
  </div>
  <!-- COUNTS -->
  <div class="counts-side">
    <div class="counts-grid">
      <div class="count-cell">
        <div class="count-label">Solved</div>
        <div class="count-val" id="totalSolved">0</div>
      </div>
      <div class="count-cell">
        <div class="count-label">Easy</div>
        <div class="count-val c-easy" id="easyCount">0</div>
      </div>
      <div class="count-cell">
        <div class="count-label">Medium</div>
        <div class="count-val c-medium" id="medCount">0</div>
      </div>
      <div class="count-cell">
        <div class="count-label">Hard</div>
        <div class="count-val c-hard" id="hardCount">0</div>
      </div>
    </div>
  </div>
</div>

<!-- DECAY BANNER (below top panel) -->
<div class="decay-banner" id="decayBanner" style="display:none">
  <div class="decay-dot"></div>
  <p id="decayMsg"></p>
</div>

<!-- ACTIVITY MAP -->
<div class="activity-block">
  <div class="activity-header">
    <div class="section-title" style="border:none;padding:0;margin:0">
      Activity &nbsp;
      <span style="font-size:9px;color:var(--muted2)">
        <span style="color:var(--accent)">■</span> solved &nbsp;
        <span style="color:var(--accent-dim);opacity:0.6">■</span> decay
      </span>
    </div>
    <div class="streak-inline">
      <span class="streak-inline-num" id="streakNum">0</span>
      <span class="streak-inline-label">day streak</span>
    </div>
  </div>
  <div style="height:1px;background:var(--border);margin-bottom:10px"></div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- TOPICS -->
<div class="topics-block">
  <div class="section-title">Topics</div>
  <div class="topics" id="topicFilters"></div>
</div>

<!-- ADD FORM -->
<div class="add-section">
  <div class="add-section-header" onclick="toggleForm()">
    <span>+ Log a Question</span>
    <span class="toggle" id="formToggle">▾</span>
  </div>
  <div class="add-form-inner" id="addFormInner">
    <div class="add-row">
      <input type="text" id="qName" placeholder="Question title (e.g. Two Sum, Merge K Lists…)" autocomplete="off" />
      <select id="qDiff" onchange="updatePreview()">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <select id="qTopic">
        <option>Array</option><option>String</option><option>Linked List</option>
        <option>Tree</option><option>Graph</option><option>DP</option>
        <option>Backtracking</option><option>Binary Search</option><option>Heap</option>
        <option>Stack</option><option>Sliding Window</option><option>Two Pointers</option>
        <option>Greedy</option><option>Math</option><option>Trie</option><option>Other</option>
      </select>
      <select id="qSource">
        <option value="LC">LeetCode</option>
        <option value="AE">AlgoExpert</option>
        <option value="CTCI">CTCI</option>
        <option value="EPI">EPI</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="add-row2">
      <input type="text" id="qLink" placeholder="Code link — GitHub, Gist, Notion…" autocomplete="off" />
      <textarea id="qNotes" placeholder="Notes — approach, complexity, edge cases…" style="height:38px"></textarea>
    </div>
    <div class="add-bottom">
      <div class="elo-preview">
        This solve: <span class="preview-val" id="eloPreview">+15</span>
        &nbsp;·&nbsp; New rating: <span class="preview-val" id="eloAfter">1615</span>
      </div>
      <button class="add-btn" onclick="addQuestion()">LOG IT</button>
    </div>
  </div>
</div>

<!-- LIST -->
<div class="list-header">
  <span>Question</span><span>ELO</span><span>Source</span><span>Topic</span><span>Difficulty</span><span></span>
</div>
<div class="q-list" id="qList"></div>

<script>
const RANKS = [
  { name:'NOVICE',      min:1600 },
  { name:'APPRENTICE',  min:1650 },
  { name:'CODER',       min:1700 },
  { name:'SOLVER',      min:1800 },
  { name:'ANALYST',     min:1950 },
  { name:'ENGINEER',    min:2100 },
  { name:'ARCHITECT',   min:2300 },
  { name:'WIZARD',      min:2500 },
  { name:'GRANDMASTER', min:2800 },
];
const TOPICS = ['Array','String','Linked List','Tree','Graph','DP','Backtracking','Binary Search','Heap','Stack','Sliding Window','Two Pointers','Greedy','Math','Trie','Other'];
const ELO_BASE = 1600;
const ELO_GAIN = { easy:5, medium:15, hard:25 };
const DECAY = 2;

let questions = JSON.parse(localStorage.getItem('dsa_elo_v2') || '[]');
let activeTopic = 'All';
let expandedId = null;
let formOpen = true;

function save() { localStorage.setItem('dsa_elo_v2', JSON.stringify(questions)); }
function today() { return new Date().toISOString().slice(0,10); }

function getStreak() {
  if (!questions.length) return 0;
  const days = new Set(questions.map(q => q.date));
  let streak = 0;
  const d = new Date(); d.setHours(0,0,0,0);
  while (true) {
    const key = d.toISOString().slice(0,10);
    if (days.has(key)) { streak++; d.setDate(d.getDate()-1); }
    else if (streak === 0) { d.setDate(d.getDate()-1); if (new Date()-d > 2*86400000) break; }
    else break;
  }
  return streak;
}

function computeElo() {
  if (!questions.length) return { elo:ELO_BASE, gained:0, lost:0, decayActive:false, gapDays:0, pendingDecay:0 };
  const gained = questions.reduce((s,q) => s + ELO_GAIN[q.diff], 0);
  const sorted = [...questions].sort((a,b)=>a.date.localeCompare(b.date));
  const firstDate = new Date(sorted[0].date); firstDate.setHours(0,0,0,0);
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const solvedDays = new Set(questions.map(q=>q.date));
  let missedDays = 0;
  const d = new Date(firstDate); d.setDate(d.getDate()+1);
  while (d <= todayD) {
    if (!solvedDays.has(d.toISOString().slice(0,10))) missedDays++;
    d.setDate(d.getDate()+1);
  }
  const lost = missedDays * DECAY;
  const elo = ELO_BASE + gained - lost;
  const lastDate = new Date(sorted[sorted.length-1].date); lastDate.setHours(0,0,0,0);
  const gapDays = Math.round((todayD - lastDate) / 86400000);
  const decayActive = gapDays > 1;
  const pendingDecay = decayActive ? (gapDays - 1) * DECAY : 0;
  return { elo, gained, lost, decayActive, gapDays, pendingDecay };
}

function getRank(elo) {
  let idx = 0;
  for (let i = RANKS.length-1; i >= 0; i--) { if (elo >= RANKS[i].min) { idx=i; break; } }
  const cur = RANKS[idx], nxt = RANKS[idx+1];
  const pct = nxt ? Math.min(100, Math.round((elo-cur.min)/(nxt.min-cur.min)*100)) : 100;
  return { name:cur.name, pct, prevLabel:cur.name, nextLabel: nxt ? nxt.name : '★ MAX' };
}

function updateStats() {
  const { elo, gained, lost, decayActive, gapDays, pendingDecay } = computeElo();
  const rank = getRank(elo);
  document.getElementById('totalSolved').textContent = questions.length;
  document.getElementById('easyCount').textContent   = questions.filter(q=>q.diff==='easy').length;
  document.getElementById('medCount').textContent    = questions.filter(q=>q.diff==='medium').length;
  document.getElementById('hardCount').textContent   = questions.filter(q=>q.diff==='hard').length;
  document.getElementById('streakNum').textContent   = getStreak();

  const eloEl = document.getElementById('eloDisplay');
  eloEl.textContent = elo;
  eloEl.className = 'elo-rating' + (decayActive ? ' bleeding' : '');
  document.getElementById('eloRank').textContent          = rank.name;
  document.getElementById('gainFromSolved').textContent   = '+'+gained;
  document.getElementById('lossFromDecay').textContent    = '-'+lost;
  document.getElementById('eloBar').style.width           = rank.pct+'%';
  document.getElementById('prevRankLabel').textContent    = rank.prevLabel;
  document.getElementById('nextRankLabel').textContent    = rank.nextLabel;

  const banner = document.getElementById('decayBanner');
  if (decayActive && questions.length > 0) {
    banner.style.display = 'flex';
    document.getElementById('decayMsg').innerHTML =
      `Streak broken — <strong>${gapDays} days</strong> since last solve. Bleeding <strong>-${pendingDecay} ELO</strong>. Solve something now.`;
  } else { banner.style.display = 'none'; }
  updatePreview();
}

function updatePreview() {
  const diff = document.getElementById('qDiff').value;
  const gain = ELO_GAIN[diff];
  const { elo } = computeElo();
  document.getElementById('eloPreview').textContent = '+'+gain;
  document.getElementById('eloAfter').textContent   = elo+gain;
}

function buildCalendar() {
  const grid = document.getElementById('calGrid'); grid.innerHTML='';
  const solved = new Set(questions.map(q=>q.date));
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const firstDate = questions.length ? new Date([...questions].sort((a,b)=>a.date.localeCompare(b.date))[0].date) : null;
  firstDate && firstDate.setHours(0,0,0,0);
  for (let i=59; i>=0; i--) {
    const d = new Date(todayD); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const el = document.createElement('div');
    const isDecay = firstDate && d > firstDate && !solved.has(key) && d < todayD;
    el.className = 'cal-day'+(solved.has(key)?' done':isDecay?' decay':'')+(i===0?' today':'');
    el.title = key+(solved.has(key)?'  ✓ solved':isDecay?'  -2 ELO decay':'');
    grid.appendChild(el);
  }
}

function buildTopics() {
  const c = document.getElementById('topicFilters'); c.innerHTML='';
  const allBtn = document.createElement('div');
  allBtn.className='topic'+(activeTopic==='All'?' active':'');
  allBtn.innerHTML=`All<span class="count">${questions.length}</span>`;
  allBtn.onclick=()=>{ activeTopic='All'; render(); };
  c.appendChild(allBtn);
  TOPICS.forEach(t => {
    const n = questions.filter(q=>q.topic===t).length;
    const btn = document.createElement('div');
    btn.className='topic'+(activeTopic===t?' active':'');
    btn.innerHTML=`${t}<span class="count">${n}</span>`;
    btn.onclick=()=>{ activeTopic=t; render(); };
    c.appendChild(btn);
  });
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildList() {
  const list = document.getElementById('qList');
  const filtered = activeTopic==='All' ? questions : questions.filter(q=>q.topic===activeTopic);
  const sorted = [...filtered].reverse();
  if (!sorted.length) {
    list.innerHTML=`<div class="empty"><span class="empty-big">#_</span>${activeTopic==='All'?'No questions yet. Log your first one above.':'No questions in this topic yet.'}</div>`;
    return;
  }
  list.innerHTML = sorted.map(q => {
    const hasNotes = q.notes && q.notes.trim();
    const hasLink  = q.link  && q.link.trim();
    const isOpen   = expandedId === q.id;
    return `
    <div class="q-item" id="qi-${q.id}">
      <div class="q-main" onclick="toggleExpand('${q.id}')">
        <div class="q-name">${esc(q.name)}${hasNotes?'<span class="note-dot" title="Has notes"></span>':''}</div>
        <div class="q-elo-gain">+${ELO_GAIN[q.diff]}</div>
        <div class="q-source">${esc(q.source)}</div>
        <div class="q-topic">${esc(q.topic)}</div>
        <div><span class="diff ${q.diff}">${q.diff}</span></div>
        <button class="del-btn" onclick="event.stopPropagation();deleteQ('${q.id}')">×</button>
      </div>
      <div class="q-expand${isOpen?' open':''}" id="exp-${q.id}">
        <div class="expand-grid">
          <div>
            <div class="expand-label">Notes</div>
            <div class="expand-notes">${hasNotes ? esc(q.notes) : '<span style="color:var(--muted2);font-family:var(--font-mono);font-size:12px">No notes.</span>'}</div>
          </div>
          <div>
            <div class="expand-label">Code</div>
            ${hasLink
              ? `<a class="expand-link" href="${esc(q.link)}" target="_blank" rel="noopener">↗ ${esc(q.link)}</a>`
              : '<span style="color:var(--muted2);font-family:var(--font-mono);font-size:12px">No link.</span>'
            }
            <div style="margin-top:14px">
              <div class="expand-label">Logged</div>
              <div class="expand-date">${q.date}</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id) { expandedId = expandedId===id ? null : id; buildList(); }
function toggleForm() {
  formOpen = !formOpen;
  document.getElementById('addFormInner').style.display = formOpen ? 'flex' : 'none';
  document.getElementById('formToggle').textContent = formOpen ? '▾' : '▸';
}

function addQuestion() {
  const name = document.getElementById('qName').value.trim();
  if (!name) { document.getElementById('qName').focus(); return; }
  questions.push({
    id: Date.now().toString(),
    name,
    diff:   document.getElementById('qDiff').value,
    topic:  document.getElementById('qTopic').value,
    source: document.getElementById('qSource').value,
    link:   document.getElementById('qLink').value.trim(),
    notes:  document.getElementById('qNotes').value.trim(),
    date:   today(),
  });
  save();
  document.getElementById('qName').value  = '';
  document.getElementById('qLink').value  = '';
  document.getElementById('qNotes').value = '';
  render();
  const bar = document.getElementById('eloBar');
  bar.style.transition = 'none'; bar.style.opacity='0.3';
  setTimeout(()=>{ bar.style.transition='width 0.8s cubic-bezier(0.16,1,0.3,1)'; bar.style.opacity='1'; }, 60);
}

function deleteQ(id) {
  questions = questions.filter(q=>q.id!==id);
  if (expandedId===id) expandedId=null;
  save(); render();
}

function render() { updateStats(); buildCalendar(); buildTopics(); buildList(); }

document.getElementById('qName').addEventListener('keydown', e=>{ if(e.key==='Enter') addQuestion(); });

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('dsa_theme', isDark ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = isDark ? '● Dark' : '○ Light';
}
// Restore saved theme
if (localStorage.getItem('dsa_theme') === 'dark') {
  document.documentElement.classList.add('dark');
  document.getElementById('themeToggle').textContent = '● Dark';
}

render();
</script>
</body>
</html>
