spring:
  application:
    name: dsa-log-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false # 1. Turn off direct console dumping
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: dsalog
  flyway:
    baseline-on-migrate: true
    baseline-version: "1"
    default-schema: dsalog
    schemas: dsalog

# 2. Add the logging configuration
logging:
  level:
    root: INFO # Keep the rest of the app at INFO
    org.hibernate.SQL: DEBUG # Only show SQL queries when running at DEBUG level


    # Optional: If you ever need to see the actual values passed into the '?' parameters,
    # you can uncomment the line below (requires TRACE level for the binder).
    # org.hibernate.orm.jdbc.bind: TRACE
