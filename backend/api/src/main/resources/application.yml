spring:
  application:
    name: dsa-log-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: dsalog
  flyway:
    baseline-on-migrate: true
    baseline-version: "1"
    default-schema: dsalog # Tell Flyway exactly which schema to manage!
    schemas: dsalog
